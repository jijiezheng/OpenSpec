name: spec-driven
version: 1
description: 默认 OpenSpec 工作流 - 提案 → 规格 → 设计 → 任务
artifacts:
  - id: proposal
    generates: proposal.md
    description: 概述变更的初始提案文档
    template: proposal.md
    instruction: |
      创建确立为什么需要此变更的提案文档。

      部分：
      - **为什么**：1-2 句话描述问题或机会。此举解决什么问题？为什么是现在？
      - **什么变更**：变更列表。具体说明新能力、修改或删除。用 **BREAKING** 标记破坏性变更。
      - **能力**：识别将创建或修改的规格：
        - **新能力**：列出正在引入的能力。每个成为新的 `specs/<name>/spec.md`。使用 kebab-case 名称（例如 `user-auth`、`data-export`）。
        - **修改的能力**：列出需求正在变更的现有能力。仅在规格级行为变更时包含（不是仅仅实现细节）。每个需要一个增量规格文件。检查 `openspec/specs/` 中的现有规格名称。如果没有需求变更则留空。
      - **影响**：受影响的代码、API、依赖或系统。

      重要：能力部分是关键。它在提案和规格阶段之间创建契约。在填写之前研究现有规格。这里列出的每个能力都需要一个相应的规格文件。

      保持简洁（1-2 页）。专注于"为什么"而不是"如何"——实现细节属于 design.md。

      这是基础——规格、设计和任务都建立在此之上。
    requires: []

  - id: specs
    generates: "specs/**/*.md"
    description: 变更的详细规格
    template: spec.md
    instruction: |
      创建定义系统应该做什么的规格文件。

      为提案的能力部分中列出的每个能力创建一个规格文件。
      - 新能力：使用提案中的确切 kebab-case 名称（specs/<capability>/spec.md）。
      - 修改的能力：在 specs/<capability>/spec.md 创建增量规格时，使用 openspec/specs/<capability>/ 中的现有规格文件夹名称。

      增量操作（使用 ## 标题）：
      - **ADDED Requirements**：新能力
      - **MODIFIED Requirements**：变更的行为——必须包含完整的更新内容
      - **REMOVED Requirements**：弃用的功能——必须包含 **Reason** 和 **Migration**
      - **RENAMED Requirements**：仅名称变更——使用 FROM:/TO: 格式

      格式需求：
      - 每个需求：`### Requirement: <name>` 后跟描述
      - 使用 SHALL/MUST 表示规范性需求（避免 should/may）
      - 每个场景：`#### Scenario: <name>` 使用 WHEN/THEN 格式
      - **关键**：场景必须正好使用 4 个井号（`####`）。使用 3 个井号或项目符号将静默失败。
      - 每个需求必须有至少一个场景。

      MODIFIED 需求工作流：
      1. 在 openspec/specs/<capability>/spec.md 中找到现有需求
      2. 复制整个需求块（从 `### Requirement:` 到所有场景）
      3. 粘贴到 `## MODIFIED Requirements` 下并编辑以反映新行为
      4. 确保标题文本完全匹配（忽略空白）

      常见陷阱：使用 MODIFIED 但内容不完整会在归档时丢失细节。
      如果添加新关注点但不更改现有行为，使用 ADDED。

      示例：
      ```
      ## ADDED Requirements

      ### Requirement: User can export data
      系统应允许用户以 CSV 格式导出他们的数据。

      #### Scenario: Successful export
      - **WHEN** user clicks "Export" button
      - **THEN** system downloads a CSV file with all user data

      ## REMOVED Requirements

      ### Requirement: Legacy export
      **Reason**: Replaced by new export system
      **Migration**: Use new export endpoint at /api/v2/export
      ```

      规格应该是可测试的——每个场景都是一个潜在的测试用例。
    requires:
      - proposal

  - id: design
    generates: design.md
    description: 带实现细节的技术设计文档
    template: design.md
    instruction: |
      创建解释如何实现变更的设计文档。

      何时包含 design.md（仅在有任何适用时创建）：
      - 横切变更（多个服务/模块）或新架构模式
      - 新外部依赖或重大数据模型变更
      - 安全、性能或迁移复杂性
      - 在编码之前受益于技术决策的模糊性

      部分：
      - **Context**：背景、当前状态、约束、利益相关者
      - **Goals / Non-Goals**：此设计实现什么和明确排除什么
      - **Decisions**：关键技术选择及其理由（为什么是 X 而不是 Y？）。包括考虑的替代方案。
      - **Risks / Trade-offs**：已知限制、可能出错的事情。格式：[Risk] → Mitigation
      - **Migration Plan**：部署步骤、回滚策略（如适用）
      - **Open Questions**：待解决的悬而未决的决策或未知

      专注于架构和方法，而不是逐行实现。
      参考提案以获取动机，参考规格以获取需求。

      好的设计文档解释技术决策背后的"为什么"。
    requires:
      - proposal

  - id: tasks
    generates: tasks.md
    description: 带可跟踪任务的生产清单
    template: tasks.md
    instruction: |
      创建分解实现工作的任务列表。

      重要：严格遵循以下模板。apply 阶段解析复选框格式以跟踪进度。不使用 `- [ ]` 的任务将不会被跟踪。

      指南：
      - 在 ## 编号标题下对相关任务进行分组
      - 每个任务必须是复选框：`- [ ] X.Y 任务描述`
      - 任务应该足够小以便在一次会话中完成
      - 按依赖关系排序任务（什么必须首先完成？）

      示例：
      ```
      ## 1. Setup

      - [ ] 1.1 Create new module structure
      - [ ] 1.2 Add dependencies to package.json

      ## 2. Core Implementation

      - [ ] 2.1 Implement data export function
      - [ ] 2.2 Add CSV formatting utilities
      ```

      参考规格以了解需要构建什么，参考设计以了解如何构建。
      每个任务应该是可验证的——你知道何时完成。
    requires:
      - specs
      - design

apply:
  requires: [tasks]
  tracks: tasks.md
  instruction: |
    读取上下文文件，完成待处理任务，完成时标记为完成。
    如果遇到阻止程序或需要澄清则暂停。