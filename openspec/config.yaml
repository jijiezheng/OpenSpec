schema: spec-driven

context: |
  技术栈：TypeScript、Node.js（≥20.19.0）、ESM 模块
  包管理器：pnpm
  CLI 框架：Commander.js

  产品语言：
  - 使用面向用户的产品行为语言编写 OpenSpec 提案和规格
  - 需求应描述体验、可观察行为和产品契约
  - 当肯定的用户结果可以表达相同规则时，避免否定实现的 SHALL 语句
  - 将内部机制放在 design.md 或 tasks.md 中，除非机制本身就是面向用户契约的一部分

  跨平台需求：
  - 此工具在 macOS、Linux 和 Windows 上运行
  - 始终使用 path.join() 或 path.resolve() 处理文件路径 - 绝不硬编码斜杠
  - 绝不假设正斜杠路径分隔符
  - 测试必须使用 path.join() 处理预期路径值，而不是硬编码字符串
  - 考虑文件系统的大小写敏感性差异

rules:
  specs:
    - 在处理文件路径时包含 Windows 路径处理的场景
    - 涉及路径的需求必须指定跨平台行为
    - 优先考虑面向用户的产品行为和可观察结果，而不是内部实现机制
    - 仅当机制是产品契约的一部分时才包含 HOW 细节
    - 如果我们生成产物，通过显式列表查找指定删除/修改，而不是模式匹配
  tasks:
    - 当变更涉及文件路径时，将 Windows CI 验证添加为任务
    - 包含跨平台测试考虑
  design:
    - 记录任何平台特定行为或限制
    - 优先使用 Node.js path 模块而不是字符串操作处理路径
    - 使用现有常量和列表 - 不要发明检测机制
    - 优先使用显式查找而不是模式匹配或正则表达式
    - 如果我们生成它，我们通过名称在常量中跟踪它